<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Client Login Portal - Sign in to access your project drafts, material choices, and design moodboards at Aurelia.">
    <title>Client Login | Aurelia Portal</title>
    <link rel="stylesheet" href="css/style.css?v=2.7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <style>
        .back-to-home-container {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }
        @media (max-width: 768px) {
            .back-to-home-container {
                position: static !important;
                margin-bottom: 1.5rem !important;
                text-align: center !important;
                width: 100% !important;
            }
            .back-to-home-container a {
                display: inline-flex !important;
                justify-content: center !important;
                align-items: center !important;
            }
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.5rem; background-color: var(--bg-primary);">

    <div class="preloader">
        <div class="preloader-loader"></div>
        <div class="preloader-logo-text" style="font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem;">
            Stackly
        </div>
    </div>
    
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <!-- Floating Back to Home Button -->
    <div class="back-to-home-container">
        <a href="index.html" class="btn btn-secondary btn-sm" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; border-radius: var(--radius-sm);"><i class="fa-solid fa-house"></i> Back to Home</a>
    </div>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- LOGIN CARD -->
    <div class="glass-card" style="width: 100%; max-width: 440px; padding: 3rem 2.5rem; text-align: center; z-index: 10; border-radius: var(--radius-md);" data-aos="zoom-in" data-aos-duration="1000">
        <div style="margin-bottom: 2rem;">
            <a href="index.html" style="display: inline-block;">
                <img src="images/logo.webp" alt="Stackly Logo" style="height: 36px; width: auto; object-fit: contain; filter: brightness(0) invert(1);">
            </a>
            <h2 style="font-size: 1.8rem; font-weight: 700; margin-top: 1.2rem; color: var(--text-light);">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.4rem;">Access your client portal or design dashboard.</p>
        </div>

        <form id="loginForm" style="display: flex; flex-direction: column; gap: 1.2rem; text-align: left;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="email" style="font-size: 0.85rem; font-weight: 600; color: var(--text-light);">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="email" id="email" placeholder="john@example.com" required style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border-glass); background: rgba(255, 255, 255, 0.03); color: var(--text-light); transition: border-color var(--transition-fast); outline: none;">
                </div>
            </div>

            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="password" style="font-size: 0.85rem; font-weight: 600; color: var(--text-light);">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding: 0.8rem 2.5rem 0.8rem 2.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border-glass); background: rgba(255, 255, 255, 0.03); color: var(--text-light); transition: border-color var(--transition-fast); outline: none;">
                    <span class="password-toggle" onclick="togglePasswordVisibility('password', this)" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 0.9rem; transition: color var(--transition-fast);"><i class="fa-solid fa-eye"></i></span>
                </div>
            </div>

            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="role" style="font-size: 0.85rem; font-weight: 600; color: var(--text-light);">Select Role</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <select id="role" required style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border-glass); background: rgba(255, 255, 255, 0.03); color: var(--text-light); transition: border-color var(--transition-fast); outline: none; appearance: none; -webkit-appearance: none;">
                        <option value="" disabled selected style="background-color: var(--bg-secondary); color: var(--text-muted);">Select Role</option>
                        <option value="client" style="background-color: var(--bg-secondary); color: var(--text-light);">Client (View Portal)</option>
                        <option value="admin" style="background-color: var(--bg-secondary); color: var(--text-light);">Admin (Manage Accounts)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; pointer-events: none;"></i>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-top: 0.2rem;">
                <label style="display: flex; align-items: center; gap: 0.4rem; color: var(--text-muted); cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" style="accent-color: var(--accent);"> Remember Me
                </label>
                <a href="#" style="color: var(--accent); font-weight: 600; text-decoration: none; white-space: nowrap;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-accent" style="width: 100%; padding: 0.9rem; margin-top: 0.5rem; font-weight: 700; border-radius: var(--radius-sm);">Access Portal</button>
        </form>

        <div id="loginSuccess" style="display: none; padding: 2rem 0; animation: fadeIn 0.5s ease;">
            <i class="fa-solid fa-circle-check" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 1rem;"></i>
            <h3 style="color: var(--text-light); font-size: 1.3rem;">Authentication Approved</h3>
            <p style="color: var(--text-muted); margin: 0.5rem 0 1.5rem 0; font-size: 0.9rem;">Redirecting to your Aurelia Design portal...</p>
            <a href="studio-portal.html" class="btn btn-primary" style="display: inline-block;">Go to Dashboard</a>
        </div>

        <div style="margin-top: 2rem; border-top: 1px solid var(--border-glass); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Don't have a design account? <a href="register.html" style="color: var(--accent); font-weight: 600; text-decoration: none;">Register Here</a></p>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800, easing: 'ease-out-cubic' });
    </script>
    <script src="js/main.js?v=2.7"></script>
</body>
</html>
